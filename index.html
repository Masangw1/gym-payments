<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gym Management Portal</title>
    <style>
        /* ─── All existing styles (keep as before) ─── */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        /* ... (keep all your existing styles until the print block) ... */

        /* ─── NEW PRINT-ONLY RECEIPT STYLES ─── */
        #printReceipt {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            max-width: 600px;
            padding: 20px;
            background: white;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
            margin: 0 auto;
            opacity: 0;
            pointer-events: none;
            z-index: -1;
        }

        @media print {
            body * {
                display: none !important;
            }
            #printReceipt,
            #printReceipt * {
                display: block !important;
                opacity: 1 !important;
                pointer-events: auto !important;
                z-index: auto !important;
            }
            #printReceipt {
                position: relative !important;
                width: 100% !important;
                max-width: 100% !important;
                padding: 20px !important;
                margin: 0 auto !important;
                background: white !important;
                page-break-inside: avoid !important;
            }
            @page {
                margin: 0 !important;
                size: auto !important;
            }
        }

        /* Responsive styles... */
        @media (max-width: 768px) { /* ... */ }
    </style>
</head>
<body>
    <!-- ─── ALL YOUR EXISTING HTML CONTENT ─── -->
    <!-- Header, features, admin, tabs, forms, history, receipt overlay -->
    <!-- Keep them exactly as before -->

    <!-- ─── PRINT-ONLY RECEIPT ─── -->
    <div id="printReceipt">
        <div style="text-align:center; border-bottom:2px solid #ff6b6b; padding-bottom:10px; margin-bottom:10px;">
            <div style="font-size:22px; font-weight:700;" id="printGymName">💪 The GYMnasium</div>
            <div style="font-size:12px; opacity:0.7;" id="printGymTagline">🏋️ Open Daily · 🧘 Aerobics Classes</div>
        </div>
        <div style="margin:10px 0;">
            <div><strong>Receipt #</strong> <span id="printReceiptNumber">GYM-2026-001</span></div>
            <div><strong>Date</strong> <span id="printReceiptDate">2026-06-21</span></div>
            <hr>
            <div><strong>Member / Guest</strong> <span id="printReceiptMember">John Doe</span></div>
            <div><strong>Payment Type</strong> <span id="printReceiptType">Monthly Subscription</span></div>
            <div><strong>Payment Method</strong> <span id="printReceiptMethod">Cash</span></div>
            <div><strong>Month</strong> <span id="printReceiptMonth">2026-06</span></div>
            <div id="printReceiptClassRow" style="display:none;"><strong>Class</strong> <span id="printReceiptClass">—</span></div>
            <div id="printReceiptNotesRow" style="display:none;"><strong>Notes</strong> <span id="printReceiptNotes">—</span></div>
            <hr>
            <div style="font-size:24px; font-weight:700; color:#ff6b6b; text-align:right;">K <span id="printReceiptAmount">50.00</span></div>
        </div>
        <div style="text-align:center; border-top:1px solid #ccc; padding-top:10px; margin-top:10px; font-size:12px; color:#888;">
            <div style="font-size:16px; font-weight:600; color:#ff6b6b;">🙏 Thank You!</div>
            <div>Powered by GYMnasium · Receipt generated automatically</div>
        </div>
    </div>

    <script>
        // ─── ALL YOUR EXISTING JAVASCRIPT ───
        // (Config, helpers, data management, etc.)
        // Keep everything except replace `printReceipt` with:

        function printReceipt() {
            if (!lastReceiptData) {
                showMessage('message', 'No receipt to print', 'error');
                return;
            }
            // The print-only div is already populated in showReceipt
            window.print();
        }

        // All other functions unchanged.
    </script>
</body>
</html>
