<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Payment Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            margin-bottom: 30px;
        }
        .header h1 { color: #ff6b6b; font-size: 2em; margin-bottom: 10px; }
        .header p { color: #ccc; }
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #333; }
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        input:focus, select:focus { outline: none; border-color: #ff6b6b; }
        .row { display: flex; gap: 15px; }
        .row .form-group { flex: 1; }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            display: none;
        }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }
        .batch-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 2px dashed #e0e0e0;
        }
        .batch-toggle {
            background: #f8f9fa;
            padding: 12px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            color: #ff6b6b;
            font-weight: 600;
        }
        .batch-form { display: none; margin-top: 20px; }
        .batch-form.active { display: block; }
        .batch-entry {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            border-left: 4px solid #ff6b6b;
        }
        .remove-btn {
            background: #dc3545;
            padding: 8px 12px;
            font-size: 14px;
            margin-top: 10px;
            width: auto;
        }
        .add-btn { background: #28a745; margin-bottom: 15px; }
        .stats {
            text-align: center;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }
        .status-badge {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #28a745;
            margin-right: 8px;
        }
        .data-table {
            margin-top: 30px;
            background: white;
            border-radius: 10px;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; font-size: 12px; }
        th { background: #ff6b6b; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>💪 Gym Payment Portal</h1>
            <p>Auto-saves to Google Sheets</p>
        </div>

        <div class="form-card">
            <div id="message" class="message"></div>
            
            <form id="paymentForm">
                <div class="row">
                    <div class="form-group">
                        <label>Payment Type *</label>
                        <select id="paymentType" required>
                            <option value="Monthly Subscription">💰 Monthly Subscription</option>
                            <option value="Drop-in">🏃 Drop-in</option>
                            <option value="Class Fee">🧘 Class Fee</option>
                            <option value="Late Fee">⚠️ Late Fee</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Date *</label>
                        <input type="date" id="date" required>
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Member/Guest Name *</label>
                        <input type="text" id="memberName" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label>Member ID (Optional)</label>
                        <input type="text" id="memberId" placeholder="Leave blank - auto-assigned">
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Amount *</label>
                        <input type="number" id="amount" step="0.01" placeholder="50" required>
                    </div>
                    <div class="form-group">
                        <label>Payment Method *</label>
                        <select id="paymentMethod" required>
                            <option value="Cash">💵 Cash</option>
                            <option value="Airtel Money">📱 Airtel Money</option>
                            <option value="Bank Transfer">🏦 Bank Transfer</option>
                        </select>
                    </div>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label>Month *</label>
                        <input type="month" id="month" required>
                    </div>
                    <div class="form-group">
                        <label>Class Type</label>
                        <input type="text" id="classType" placeholder="Aerobics / Yoga / Spin">
                    </div>
                </div>

                <div class="form-group">
                    <label>Notes</label>
                    <input type="text" id="notes" placeholder="Optional notes">
                </div>

                <button type="submit" id="submitBtn">💾 Save Payment</button>
            </form>

            <div class="batch-section">
                <div class="batch-toggle" onclick="toggleBatch()">📦 Batch Entry</div>
                <div id="batchForm" class="batch-form">
                    <div id="batchEntries"></div>
                    <button type="button" class="add-btn" onclick="addBatchEntry()">+ Add Payment</button>
                    <button type="button" onclick="submitBatch()">💾 Save All</button>
                </div>
            </div>

            <div class="stats">
                <span class="status-badge"></span> <span id="paymentCount">0</span> payments recorded
            </div>
        </div>

        <div class="data-table">
            <table id="paymentTable">
                <thead><tr><th>Date</th><th>Type</th><th>Name</th><th>Amount</th><th>Method</th><th>Month</th><tr></thead>
                <tbody id="tableBody"><tr><td colspan="6" style="text-align:center;">No payments</td></tr></tbody>
            </table>
        </div>
    </div>

    <script>
        // CLOUDFLARE WORKER URL - UPDATE THIS
        var WORKER_URL = 'https://workers-playground-tight-term-fdc2.mmasangwi.workers.dev';
        
        var payments = [];
        var batchCounter = 1;

        function loadData() {
            var saved = localStorage.getItem('gymPayments');
            if (saved) {
                payments = JSON.parse(saved);
            }
            renderTable();
            updateStats();
        }

        function saveData() {
            localStorage.setItem('gymPayments', JSON.stringify(payments));
            updateStats();
        }

        function updateStats() {
            document.getElementById('paymentCount').innerText = payments.length;
        }

        function renderTable() {
            var tbody = document.getElementById('tableBody');
            if (payments.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No payments</td></tr>';
                return;
            }
            var html = '';
            for (var i = payments.length - 1; i >= 0; i--) {
                var p = payments[i];
                html += '<tr>';
                html += '<td>' + p.date + '</td>';
                html += '<td>' + p.paymentType + '</td>';
                html += '<td>' + p.memberName + '</td>';
                html += '<td>' + p.amount + '</td>';
                html += '<td>' + p.paymentMethod + '</td>';
                html += '<td>' + p.month + '</td>';
                html += '</tr>';
            }
            tbody.innerHTML = html;
        }

        function saveToGoogleSheets(payment) {
            return fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payment)
            })
            .then(function(response) { 
                return response.json(); 
            })
            .then(function(result) {
                if (!result.success) {
                    throw new Error(result.error || 'Unknown error');
                }
                return result;
            });
        }

        document.getElementById('paymentForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            var memberName = document.getElementById('memberName').value;
            var classType = document.getElementById('classType').value;
            var displayName = memberName;
            if (classType) {
                displayName = memberName + ' (' + classType + ')';
            }
            var memberId = document.getElementById('memberId').value;
            
            var payment = {
                date: document.getElementById('date').value,
                paymentType: document.getElementById('paymentType').value,
                memberId: memberId || '',
                memberName: displayName,
                amount: parseFloat(document.getElementById('amount').value),
                paymentMethod: document.getElementById('paymentMethod').value,
                month: document.getElementById('month').value,
                notes: document.getElementById('notes').value || ''
            };
            
            var btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = 'Saving...';
            
            saveToGoogleSheets(payment)
                .then(function(result) {
                    payments.push(payment);
                    saveData();
                    renderTable();
                    var memberMsg = result.memberId ? ' (Member: ' + result.memberId + ')' : '';
                    showMessage('✅ ' + displayName + ' paid ' + payment.amount + memberMsg, 'success');
                    
                    document.getElementById('paymentForm').reset();
                    document.getElementById('date').valueAsDate = new Date();
                    document.getElementById('month').value = new Date().toISOString().slice(0, 7);
                    document.getElementById('memberId').value = '';
                    document.getElementById('classType').value = '';
                    document.getElementById('notes').value = '';
                })
                .catch(function(error) {
                    showMessage('❌ Error: ' + error.message, 'error');
                })
                .finally(function() {
                    btn.disabled = false;
                    btn.textContent = '💾 Save Payment';
                });
        });

        function toggleBatch() {
            var batchForm = document.getElementById('batchForm');
            if (batchForm.classList.contains('active')) {
                batchForm.classList.remove('active');
            } else {
                batchForm.classList.add('active');
                if (document.getElementById('batchEntries').children.length === 0) {
                    addBatchEntry();
                }
            }
        }

        function addBatchEntry() {
            var container = document.getElementById('batchEntries');
            var id = batchCounter;
            var today = new Date().toISOString().slice(0,10);
            var currentMonth = new Date().toISOString().slice(0,7);
            var entryDiv = document.createElement('div');
            entryDiv.className = 'batch-entry';
            entryDiv.id = 'batch-' + id;
            entryDiv.innerHTML = '<h4>Payment #' + id + '</h4>' +
                '<div class="row">' +
                    '<div class="form-group"><label>Date</label><input type="date" class="batch-date" value="' + today + '"></div>' +
                    '<div class="form-group"><label>Type</label>' +
                        '<select class="batch-type">' +
                            '<option value="Monthly Subscription">Monthly Subscription</option>' +
                            '<option value="Drop-in">Drop-in</option>' +
                            '<option value="Class Fee">Class Fee</option>' +
                            '<option value="Late Fee">Late Fee</option>' +
                        '</select>' +
                    '</div>' +
                '</div>' +
                '<div class="row">' +
                    '<div class="form-group"><label>Name</label><input type="text" class="batch-name" placeholder="Member/Guest name"></div>' +
                    '<div class="form-group"><label>Amount</label><input type="number" class="batch-amount" step="0.01" placeholder="50"></div>' +
                '</div>' +
                '<div class="row">' +
                    '<div class="form-group"><label>Method</label>' +
                        '<select class="batch-method">' +
                            '<option value="Cash">Cash</option>' +
                            '<option value="Airtel Money">Airtel Money</option>' +
                            '<option value="Bank Transfer">Bank Transfer</option>' +
                        '</select>' +
                    '</div>' +
                    '<div class="form-group"><label>Month</label><input type="month" class="batch-month" value="' + currentMonth + '"></div>' +
                '</div>' +
                '<button class="remove-btn" onclick="removeBatchEntry(' + id + ')">Remove</button>';
            container.appendChild(entryDiv);
            batchCounter = batchCounter + 1;
        }

        function removeBatchEntry(id) {
            var element = document.getElementById('batch-' + id);
            if (element) {
                element.remove();
            }
        }

        function submitBatch() {
            var batchEntries = document.querySelectorAll('.batch-entry');
            var saved = 0;
            var failed = 0;
            var promises = [];
            
            for (var i = 0; i < batchEntries.length; i++) {
                var entry = batchEntries[i];
                var name = entry.querySelector('.batch-name').value;
                var amount = entry.querySelector('.batch-amount').value;
                
                if (name && amount) {
                    var payment = {
                        date: entry.querySelector('.batch-date').value,
                        paymentType: entry.querySelector('.batch-type').value,
                        memberId: '',
                        memberName: name,
                        amount: parseFloat(amount),
                        paymentMethod: entry.querySelector('.batch-method').value,
                        month: entry.querySelector('.batch-month').value,
                        notes: 'Batch entry'
                    };
                    
                    var promise = saveToGoogleSheets(payment)
                        .then(function() {
                            saved = saved + 1;
                            payments.push(payment);
                        })
                        .catch(function() {
                            failed = failed + 1;
                        });
                    promises.push(promise);
                }
            }
            
            Promise.all(promises).then(function() {
                if (saved > 0) {
                    saveData();
                    renderTable();
                    var msg = '✅ Saved ' + saved + ' payment(s)!';
                    if (failed > 0) {
                        msg = msg + ' (' + failed + ' failed)';
                    }
                    showMessage(msg, 'success');
                } else {
                    showMessage('No valid entries to save', 'error');
                }
                
                document.getElementById('batchEntries').innerHTML = '';
                batchCounter = 1;
                document.getElementById('batchForm').classList.remove('active');
            });
        }

        function showMessage(msg, type) {
            var messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = 'message ' + type;
            setTimeout(function() {
                messageDiv.className = 'message';
            }, 5000);
        }

        document.getElementById('date').valueAsDate = new Date();
        document.getElementById('month').value = new Date().toISOString().slice(0, 7);
        
        loadData();
    </script>
</body>
</html>
